# Netlify site: anthropic-admin-provider.stackql.io
# Base directory (set in Netlify UI): stackql_anthropic_admin_provider/website

[build]
  command = "yarn build"
  publish = "build"

[build.environment]
  NODE_VERSION = "22"

# Selective builds: skip when neither this provider's tree nor this site
# changed since the last deploy.
[context.production]
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- ../../stackql_anthropic_admin_provider ../../factory"
